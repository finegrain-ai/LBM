# neptune
neptune_project: LBM-Eraser
timestep_sampling: custom_timesteps
unet_input_channels: 4
vae_num_channels: 4
selected_timesteps: [250, 500, 750, 1000]
prob: [0.25, 0.25, 0.25, 0.25]
pixel_loss_type: lpips # l1 l2
pixel_loss_weight: 10.0
latent_loss_type: l2 # l1 l2
latent_loss_weight: 1.0
bridge_noise_sigma: 0.05 # see Appendix A.1
conditioning_images_keys: []
conditioning_masks_keys: []
resolution: 512

train_data: 
  path: "data/RORD-shuffled/train-{000000..000408}.tar" # drop the 4 last shards cause the last shard does not have the same number of samples
  per_worker_batch_size: 8
  num_workers: 10
  kind: "eraser"
  name: "RORD-shuffled"
  shuffle_before_split_by_node_buffer_size: 200 # 200 out of 400 shards
validation_data: 
  path: "data/BaiLing/RemovalBench-{0000..0007}.tar"
  # We set validation batch_size to 1 (and num_workers=1), 
  # so we validate on various image sizes
  # (it avoids bucketing related side-effects)
  per_worker_batch_size: 1
  num_workers: 1
  kind: "eraser"
  name: "RemovalBench"
  extension: "png"

learning_rate: 3e-5 # see Appendix A.1
optimizer: AdamW
num_steps: [1, 2, 4]
log_interval: 10 # log the loss/lr every 10 steps
max_epochs: 50
gradient_clip_val: 1.0

# Validation
# val_batch_size is fixed to 1, to have different image sizes
limit_val_batches: 16 # 16 x 1 (val_batch_size) x 4 GPUs = 64 samples for validation
val_check_interval: 500 # 500 means every 8 (batch) * 4 (gpus) * 500 = 16000 training samples

# Checkpointing
resume_from_checkpoint: ./checkpoints-1st-stage/last.ckpt
# Each checkpoint is 5.1GB, 25 checkpoints = 125GB
# 25 * 500 = 12500 last steps are covered
save_top_k: 25
save_ckpt_path: ./checkpoints-2nd-stage
